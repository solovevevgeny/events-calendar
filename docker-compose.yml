version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: calendar-server
    environment:
      - NODE_ENV=production
      - PORT=4000
    volumes:
      - ./data:/app/data
    networks:
      - calendar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: calendar-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - calendar-network
    restart: unless-stopped

networks:
  calendar-network:
    driver: bridge

volumes:
  calendar-data: